<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Name — Mie</title>

  <!-- ═══════════════════════════════════════════════════════
       BACK-TO-DASHBOARD SNIPPET
       Paste this <style> block and the <nav> below into any
       project's <head> / top of <body> to get a HUD-style
       back button. No dependencies, no extra files needed.
  ════════════════════════════════════════════════════════ -->
  <style>
    .hub-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      position: fixed;
      top: 14px;
      left: 16px;
      z-index: 9999;
      padding: 6px 14px 6px 10px;
      background: rgba(4, 7, 15, 0.75);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 240, 255, 0.2);
      border-radius: 6px;
      font-family: 'Orbitron', 'Courier New', monospace;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #00f0ff;
      text-decoration: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .hub-back:hover,
    .hub-back:focus-visible {
      border-color: rgba(0, 240, 255, 0.6);
      box-shadow: 0 0 14px rgba(0, 240, 255, 0.3);
      outline: none;
    }
    .hub-back-arrow {
      font-size: 0.9rem;
      line-height: 1;
    }
  </style>
</head>

<body>

  <!-- ← Back to Dashboard link — paste at the top of <body> -->
  <a class="hub-back" href="../../index.html" aria-label="Back to Project Hub">
    <span class="hub-back-arrow">←</span> Hub
  </a>
  <!-- ════════════════════════════════════════════════════════
       END OF SNIPPET — your project content goes below
  ════════════════════════════════════════════════════════ -->


  <h1>Your Project Name</h1>
  <p>Your project content goes here. The ← Hub button above floats in the top-left corner on every page.</p>

  <!-- Adjust ../../index.html depth to match where your project lives:
       projects/myproject/index.html → ../../index.html  (2 levels up)
       projects/sub/deep/index.html  → ../../../index.html (3 levels up)
  -->

</body>
</html>
